<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Points System — JuanFi</title>
  <link rel="stylesheet" href="styles.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700&display=swap" rel="stylesheet" />
</head>
<body>
  <div class="page">
    <header class="header">
      <h1>Points System</h1>
      <p class="subtitle">Admin — syncs to Firebase Realtime Database</p>
    </header>

    <section class="card auth-card" id="authCard">
      <h2 class="section-title">Admin sign-in</h2>
      <p class="auth-hint">Required to save — matches Realtime Database rules (<code>auth != null</code>).</p>
      <div class="auth-fields">
        <label class="auth-label">
          Email
          <input type="email" id="authEmail" class="auth-input" autocomplete="username" />
        </label>
        <label class="auth-label">
          Password
          <input type="password" id="authPassword" class="auth-input" autocomplete="current-password" />
        </label>
      </div>
      <div class="auth-actions">
        <button type="button" class="btn-secondary" id="loginBtn">Sign in</button>
        <button type="button" class="btn-text" id="logoutBtn" hidden>Sign out</button>
      </div>
      <p class="auth-user" id="authUserLine" hidden></p>
    </section>

    <main class="card" id="mainCard">
      <div class="field-row toggle-row">
        <label class="toggle-label" for="enableToggle">Enable Points System</label>
        <button type="button" class="toggle" id="enableToggle" role="switch" aria-checked="false" aria-labelledby="enableToggleLabel">
          <span class="toggle-track"></span>
          <span class="toggle-thumb"></span>
        </button>
        <span id="enableToggleLabel" class="visually-hidden">Enable Points System</span>
      </div>

      <section class="section">
        <h2 class="section-title">Percentage</h2>
        <div class="percent-wrap">
          <span class="percent-prefix" aria-hidden="true">%</span>
          <input type="number" id="percentageInput" class="percent-input" min="0" max="100" step="0.01" value="0" inputmode="decimal" />
        </div>
      </section>

      <section class="section">
        <div class="table-wrap">
          <table class="rates-table">
            <thead>
              <tr>
                <th>Amount</th>
                <th>Points Earned</th>
              </tr>
            </thead>
            <tbody id="ratesBody">
              <!-- filled by app.js -->
            </tbody>
          </table>
        </div>
      </section>

      <div class="status-bar">
        <span id="statusText" class="status-text" aria-live="polite"></span>
      </div>

      <footer class="card-footer">
        <button type="button" class="btn-save" id="saveBtn" disabled>
          <svg class="btn-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
            <path d="M19 21H5a2 2 0 01-2-2V5a2 2 0 012-2h11l5 5v11a2 2 0 01-2 2z" />
            <polyline points="17 21 17 13 7 13 7 21" />
            <polyline points="7 3 7 8 15 8" />
          </svg>
          Save changes
        </button>
      </footer>
    </main>
  </div>

  <script type="module" src="app.js"></script>
</body>
</html>
